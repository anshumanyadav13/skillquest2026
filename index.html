<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillQuest 2026 - Logo Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h3>🌍 World Youth Skills Day</h3>

    <h1>SkillQuest 2026</h1>

    <p>Test Your Brand & Technology Knowledge</p>

    <div class="card">

        <input type="text" id="name" placeholder="Enter Your Name">

        <input type="text" id="roll" placeholder="Enter Roll Number">

        <select id="class">
            <option>Select Class</option>
            <option>FY BSc IT A</option>
            <option>FY BSc IT B</option>
            <option>FY BSc IT C</option>
        </select>

        <button onclick="startQuiz()">Start Quiz</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
